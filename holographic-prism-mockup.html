<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80タイプ診断 - ホログラフィック・プリズム UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #050505; /* 漆黒の背景でホログラムを引き立たせる */
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }

        .font-syncopate {
            font-family: 'Syncopate', sans-serif;
        }

        /* 
         * ホログラフィック・プリズム アニメーション
         * レアなトレーディングカードのような七色の輝き
         */
        @keyframes holo-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 背景に漂う微細なオーロラの粒子のような光 */
        .ambient-dust {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 128, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(64, 224, 208, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.08) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
            filter: blur(30px);
            animation: holo-shift 15s ease-in-out infinite alternate;
            background-size: 200% 200%;
        }

        /* 
         * ホログラムカード枠 
         * カーソル（今回はアニメーション）に合わせて虹色に輝くボーダー
         */
        .holo-card-wrapper {
            position: relative;
            padding: 2px; /* ボーダーの太さ */
            border-radius: 32px;
            background: linear-gradient(125deg, 
                #ff0080, #ff8c00, #40e0d0, #ff0080, #8a2be2, #ff0080
            );
            background-size: 300% 300%;
            animation: holo-shift 6s linear infinite;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                0 0 20px rgba(64, 224, 208, 0.2), /* ティールグロー */
                0 0 20px rgba(255, 0, 128, 0.2); /* ピンクグロー */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .holo-card-wrapper:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.6),
                0 0 30px rgba(64, 224, 208, 0.3),
                0 0 30px rgba(255, 0, 128, 0.3);
        }

        /* カードの本体（ダークグラスモーフィズム） */
        .holo-card-inner {
            background: rgba(10, 10, 12, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            height: 100%;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* カード内部を走る虹色のハイライト（ホログラムの反射） */
        .holo-card-inner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, 
                rgba(255,0,128,0.1), rgba(64,224,208,0.1), rgba(138,43,226,0.1)
            );
            background-size: 200% 200%;
            animation: holo-shift 8s linear infinite reverse;
            mix-blend-mode: color-dodge;
            pointer-events: none;
        }

        /* タイトル文字のホログラフィックグラデーション */
        .text-holo {
            background: linear-gradient(to right, #ffb6ff, #b6ffff, #e6b6ff, #ffb6ff);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: holo-shift 4s linear infinite;
        }

        /* プレミアムなボタン */
        .btn-holo {
            background: linear-gradient(135deg, #2a2a35, #14141c);
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* ボタンの虹色ボーダー（偽装） */
        .btn-holo::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1.5px; /* ボーダー幅 */
            border-radius: 16px;
            background: linear-gradient(125deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
            background-size: 300% 300%;
            animation: holo-shift 4s linear infinite;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* ボタンホバー時に内部がホログラムで満たされる */
        .btn-holo::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 15px;
            background: linear-gradient(125deg, rgba(255,0,128,0.2), rgba(64,224,208,0.2));
            background-size: 200% 200%;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1;
        }

        .btn-holo:hover::after {
            opacity: 1;
            animation: holo-shift 3s linear infinite;
        }

        .btn-content {
            position: relative;
            z-index: 2;
        }
        
        /* 七色に光るアイコン枠 */
        .icon-prism {
            background: linear-gradient(125deg, rgba(255,0,128,0.1), rgba(64,224,208,0.1));
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
        }

    </style>
</head>
<body class="antialiased min-h-screen relative selection:bg-fuchsia-500/30 selection:text-white">
    <!-- 背景オーラ -->
    <div class="ambient-dust"></div>
    
    <!-- 全体のコンテナ -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-center px-6 py-12 relative z-10">
        
        <!-- ヘッダー部分 -->
        <div class="mb-10 text-center">
            
            <div class="inline-block px-3 py-1 mb-6 rounded-md bg-white/5 border border-white/10 backdrop-blur-sm">
                <span class="font-syncopate text-[9px] font-bold tracking-[0.3em] text-gray-400 uppercase">Premium Digital Collectible</span>
            </div>
            
            <!-- 1行のタイトル -->
            <h1 class="text-[2.5rem] leading-tight font-syncopate font-black mb-2 text-white drop-shadow-lg tracking-tighter flex items-center justify-center gap-1">
                80タイプ<span class="text-[1.7rem] text-holo relative top-0.5 ml-1">診断</span>
            </h1>
            <p class="text-[14px] font-medium text-gray-400 mt-4 leading-relaxed">
                誰とも違う、あなただけの<br>
                「レアリティ」を解き放つ。
            </p>
        </div>

        <!-- 診断カード (ホログラフィック枠) -->
        <main class="holo-card-wrapper mb-10">
            <div class="holo-card-inner p-8 flex flex-col items-center">
                
                <!-- ダイヤモンド/プリズムを模したアイコン -->
                <div class="icon-prism w-20 h-20 rounded-2xl mb-6 flex items-center justify-center rotate-45 transform transition-transform duration-700 hover:rotate-[225deg]">
                    <svg class="w-10 h-10 text-white -rotate-45 drop-shadow-[0_0_8px_rgba(255,255,255,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2l-5.5 8.5L12 22l5.5-11.5L12 2z"></path></svg>
                </div>
                
                <h2 class="text-[20px] leading-snug font-bold mb-3 text-white tracking-wide text-center">
                    あなたが引くカードは、<br>80分の1。
                </h2>
                
                <p class="text-[12px] text-gray-400 font-medium mb-8 leading-relaxed text-center">
                    57のアナリティクス・クエスチョンが、<br>
                    あなたの潜在的な才能を高精度にラスタライズします。
                </p>
                
                <!-- プログレス／精度表示（ホログラム） -->
                <div class="w-full mb-8">
                    <div class="flex justify-between items-end mb-2">
                        <span class="font-syncopate text-[9px] tracking-[0.2em] text-gray-500">Authenticity</span>
                        <span class="font-syncopate text-sm font-bold text-holo">98.5%</span>
                    </div>
                    <div class="w-full bg-black/50 rounded-full h-1.5 overflow-hidden border border-white/5">
                        <!-- 虹色のプログレスバー -->
                        <div class="h-full w-[98.5%] rounded-full relative" style="background: linear-gradient(90deg, #ff0080, #ff8c00, #40e0d0, #8a2be2); background-size: 200% 200%; animation: holo-shift 3s linear infinite;">
                            <div class="absolute right-0 top-0 bottom-0 w-6 bg-white shadow-[0_0_12px_rgba(255,255,255,1)]"></div>
                        </div>
                    </div>
                </div>

                <!-- CTAボタン -->
                <button class="btn-holo w-full py-4 flex justify-center items-center gap-2 group">
                    <span class="btn-content font-bold text-[15px] text-white tracking-widest">Unbox Your Type</span>
                    <svg class="w-5 h-5 btn-content text-white transform group-hover:scale-110 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
                </button>
            </div>
            
        </main>

        <!-- メトリクス -->
        <div class="flex justify-center gap-8 items-center px-4">
            <div class="text-center">
                <p class="font-syncopate text-[8px] tracking-[0.2em] text-gray-500 mb-1.5">Total Minted</p>
                <p class="font-syncopate text-[14px] text-white font-bold">104K+</p>
            </div>
            <div class="w-px h-8 bg-gray-800"></div>
            <div class="text-center">
                <p class="font-syncopate text-[8px] tracking-[0.2em] text-gray-500 mb-1.5">Free to Reveal</p>
                <p class="font-syncopate text-[14px] text-white font-bold text-holo">100%</p>
            </div>
        </div>
        
    </div>
</body>
</html>
