<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80タイプ診断 - ダークメッシュUIモック</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #0f0c29; /* 深いネイビーブラックのフォールバック */
            color: #ffffff;
        }
        
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        
        /* 
         * メッシュグラデーション背景 (ダーク版)
         * 深海や宇宙を思わせるダークトーンに、オーロラのような鮮やかな色（パープル、シアン、ピンク）を配置
         */
        .mesh-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-color: #0b0914; /* ベースをさらに暗く */
            background-image: 
                radial-gradient(at 20% 40%, hsla(276, 100%, 25%, 0.8) 0px, transparent 50%),
                radial-gradient(at 80% 10%, hsla(189, 100%, 30%, 0.7) 0px, transparent 50%),
                radial-gradient(at 0% 90%, hsla(330, 100%, 25%, 0.8) 0px, transparent 50%),
                radial-gradient(at 90% 80%, hsla(242, 100%, 35%, 0.8) 0px, transparent 50%),
                radial-gradient(at 50% 50%, hsla(300, 100%, 15%, 0.5) 0px, transparent 50%);
            z-index: -1;
            animation: mesh-movement 25s ease-in-out infinite alternate;
            filter: blur(50px) saturate(1.5);
        }

        /* アクセントの光（星やネオンのような印象） */
        .ambient-light {
            position: fixed;
            top: 20%;
            left: 30%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px);
            z-index: -1;
            animation: pulse-light 8s ease-in-out infinite alternate;
            mix-blend-mode: screen;
        }
        .ambient-light-2 {
            position: fixed;
            bottom: 10%;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(50px);
            z-index: -1;
            animation: pulse-light 12s ease-in-out infinite alternate-reverse;
            mix-blend-mode: screen;
        }

        @keyframes pulse-light {
            0% { opacity: 0.5; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        @keyframes mesh-movement {
            0% { transform: translate(0, 0) scale(1.1); }
            50% { transform: translate(3%, 4%) scale(1.05); }
            100% { transform: translate(-2%, -3%) scale(1.1); }
        }
        
        /* グラスモーフィズムパネル (ダーク版)
         * 白ではなく黒ベースの半透明にし、暗い背景に溶け込ませる
         */
        .glass-panel-dark {
            background: rgba(15, 12, 25, 0.5);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            /* ボーダーを細く光らせて輪郭を立たせる */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top-color: rgba(255, 255, 255, 0.2);
            border-left-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        
        /* フローティングアニメーション */
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }
        
        /* ボタンのノイズ + ネオングロー */
        .btn-neon {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #c026d3, #ec4899);
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.4), inset 0 2px 0 rgba(255,255,255,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }
        .btn-neon::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15;
            pointer-events: none;
            mix-blend-mode: overlay;
        }
        .btn-neon:hover {
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.6), inset 0 2px 0 rgba(255,255,255,0.4);
        }

        /* 文字にうっすら光彩（ネオン感）を持たせる */
        .text-glow {
            text-shadow: 0 0 24px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body class="antialiased min-h-screen relative selection:bg-fuchsia-500 selection:text-white">
    <!-- 背景群 -->
    <div class="mesh-bg"></div>
    <div class="ambient-light"></div>
    <div class="ambient-light-2"></div>
    
    <!-- 全体のコンテナ -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-center px-5 py-12 relative z-10">
        
        <!-- ヘッダー部分 -->
        <header class="text-center mb-8 floating text-white/50">
            <!-- 視認性向上のためにテキストには少し影や色の工夫 -->
        </header>

        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full bg-white/5 backdrop-blur-md text-xs font-bold text-fuchsia-300 tracking-wider mb-5 border border-white/10 shadow-sm">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-fuchsia-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-fuchsia-500"></span>
                </span>
                AI NEURAL ANALYSIS
            </div>
            
            <h1 class="text-[2.5rem] leading-tight font-montserrat font-black mb-2 text-white tracking-tighter text-glow">
                80タイプ<span class="text-3xl ml-1 text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-fuchsia-300 filter drop-shadow-[0_0_10px_rgba(236,72,153,0.3)]">診断</span>
            </h1>
            <p class="text-gray-300 font-medium text-[14px] mt-4 bg-black/30 inline-block px-4 py-1.5 rounded-full backdrop-blur-md border border-white/5">深層心理へのアクセスを開始します</p>
        </div>

        <!-- 診断カード (ダークグラスモーフィズム) -->
        <main class="glass-panel-dark rounded-[2.5rem] p-7 mb-8 relative overflow-hidden transform transition-all hover:-translate-y-1 duration-300">
            <!-- カード内の環境光（オーブ） -->
            <div class="absolute -top-16 -right-16 w-40 h-40 bg-fuchsia-600 rounded-full mix-blend-screen filter blur-[40px] opacity-30"></div>
            <div class="absolute -bottom-16 -left-16 w-32 h-32 bg-cyan-600 rounded-full mix-blend-screen filter blur-[40px] opacity-20"></div>
            
            <div class="relative z-10 text-center">
                
                <!-- アイコン（少しサイバーな雰囲気） -->
                <div class="w-20 h-20 mx-auto bg-black/40 rounded-full flex items-center justify-center mb-6 border border-white/10 ring-1 ring-white/5 backdrop-blur-xl shadow-[0_0_30px_rgba(192,38,211,0.2)]">
                    <svg class="w-10 h-10 text-fuchsia-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
                    </svg>
                </div>
                
                <h2 class="text-[22px] leading-snug font-bold mb-3 text-white">
                    本当の自分、<br>知る覚悟はある？
                </h2>
                <p class="text-[14px] text-gray-400 font-medium mb-6 leading-relaxed">
                    独自のパーソナリティアルゴリズムが<br>57の質問からあなたの"コア"を抽出。<br>
                    <span class="inline-block mt-3 bg-fuchsia-500/10 text-fuchsia-300 border border-fuchsia-500/20 px-3 py-1 rounded text-[11px] font-bold tracking-wider">所要時間：約3 MINS</span>
                </p>
                
                <!-- プログレス／精度バー（ネオン風） -->
                <div class="bg-black/50 backdrop-blur-md rounded-2xl p-4 mb-8 border border-white/5">
                    <div class="flex justify-between items-center text-xs font-bold text-gray-400 mb-2">
                        <span class="tracking-widest">MATCHING RATE</span>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-400 text-lg font-montserrat">98.5%</span>
                    </div>
                    <div class="w-full bg-gray-900 rounded-full h-1.5 overflow-hidden">
                        <div class="bg-gradient-to-r from-cyan-500 via-fuchsia-500 to-pink-500 h-full rounded-full w-[98.5%] relative">
                            <!-- 光らせるエフェクト -->
                            <div class="absolute top-0 right-0 bottom-0 w-10 bg-white/50 blur-[4px]"></div>
                        </div>
                    </div>
                </div>

                <!-- CTAボタン（ネオングロー） -->
                <button class="btn-neon w-full py-4 rounded-2xl text-white font-bold text-[17px] transform transition-transform hover:scale-[1.02] active:scale-[0.98] flex justify-center items-center gap-2 group">
                    <span class="tracking-widest">SCAN START</span>
                    <svg class="w-5 h-5 transform group-hover:translate-x-1.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
                <p class="text-[10px] text-gray-500 mt-4 font-medium tracking-wider">※完全無料・登録不要で解析完了します</p>
            </div>
        </main>

        <!-- ソーシャルプルーフ (ダーク版) -->
        <div class="text-center">
            <p class="text-[10px] font-bold text-gray-400 mb-4 tracking-widest uppercase">Over 100k Users Analyzed</p>
            <div class="flex justify-center -space-x-3 items-center opacity-80 hover:opacity-100 transition-opacity">
                <img src="https://i.pravatar.cc/100?img=1" class="w-10 h-10 rounded-full border-2 border-[#0b0914] object-cover" alt="user">
                <img src="https://i.pravatar.cc/100?img=3" class="w-10 h-10 rounded-full border-2 border-[#0b0914] object-cover filter grayscale" alt="user">
                <img src="https://i.pravatar.cc/100?img=5" class="w-10 h-10 rounded-full border-2 border-[#0b0914] object-cover" alt="user">
                <img src="https://i.pravatar.cc/100?img=9" class="w-10 h-10 rounded-full border-2 border-[#0b0914] object-cover filter sepia" alt="user">
                <div class="w-10 h-10 rounded-full border-2 border-fuchsia-500/30 bg-black/60 backdrop-blur-md flex items-center justify-center text-[11px] font-bold text-fuchsia-300">+10k</div>
            </div>
        </div>
        
    </div>
</body>
</html>
