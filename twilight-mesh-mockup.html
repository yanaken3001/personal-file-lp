<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80タイプ診断 - トワイライトメッシュUIモック</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Noto+Sans+JP:wght@500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #2e1c3b; /* 夕暮れのような深い紫をベース フォールバック */
            color: #ffffff;
        }
        
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        
        /* 
         * メッシュグラデーション背景 (中間色/トワイライト版)
         * 暗すぎず、明るすぎない。夕暮れやマジックアワーのようなエモーショナルな色使い
         * （深い紫ベースに、サーモンピンク、オレンジ、ライトブルーを配置）
         */
        .mesh-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-color: #1a1025; /* ベースは濃い紫 */
            background-image: 
                radial-gradient(at 0% 0%, hsla(280, 60%, 25%, 1) 0px, transparent 50%),
                radial-gradient(at 80% 20%, hsla(330, 80%, 65%, 0.8) 0px, transparent 50%), /* ピンク */
                radial-gradient(at 20% 80%, hsla(190, 80%, 55%, 0.7) 0px, transparent 50%), /* シアン */
                radial-gradient(at 90% 90%, hsla(20, 90%, 65%, 0.8) 0px, transparent 50%), /* オレンジ/ピーチ */
                radial-gradient(at 50% 50%, hsla(260, 70%, 40%, 0.6) 0px, transparent 50%); /* 中央に紫 */
            z-index: -1;
            animation: mesh-movement 22s ease-in-out infinite alternate;
            filter: blur(45px) saturate(1.3);
        }

        @keyframes mesh-movement {
            0% { transform: translate(0%, 0%) scale(1.05) rotate(0deg); }
            50% { transform: translate(2%, 3%) scale(1.1) rotate(2deg); }
            100% { transform: translate(-2%, -2%) scale(1.05) rotate(-1deg); }
        }
        
        /* グラスモーフィズムパネル (ミディアム版)
         * 白と黒の中間。透明度を高めにして背景色を綺麗に透過させる
         */
        .glass-panel-mid {
            background: rgba(40, 30, 60, 0.35); /* 少し紫がかった半透明黒 */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-bottom-color: rgba(255, 255, 255, 0.1);
            border-right-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        
        /* フローティングアニメーション */
        .floating {
            animation: float 5s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }
        
        /* ボタン (グラデーション＋少しのシャドウでポップさを強調) */
        .btn-twilight {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53); /* 暖色系の明るいグラデに */
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4), inset 0 2px 0 rgba(255,255,255,0.3);
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .btn-twilight:hover {
            box-shadow: 0 12px 25px rgba(255, 107, 107, 0.5), inset 0 2px 0 rgba(255,255,255,0.4);
        }

        /* 輝くテキストエフェクト */
        .text-shimmer {
            background: linear-gradient(
                to right,
                #fff 20%,
                #ffd1e8 40%,
                #ffd1e8 60%,
                #fff 80%
            );
            background-size: 200% auto;
            color: #000;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body class="antialiased min-h-screen relative selection:bg-rose-400 selection:text-white">
    <!-- 背景メッシュ -->
    <div class="mesh-bg"></div>
    
    <!-- 全体のコンテナ -->
    <div class="max-w-md mx-auto min-h-screen flex flex-col justify-center px-5 py-12 relative z-10">
        
        <!-- ヘッダー部分 -->
        <div class="text-center mb-7">
            <!-- バッジ（白くて少しポップに） -->
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/20 backdrop-blur-md text-[11px] font-bold text-white tracking-widest mb-6 border border-white/30 shadow-[0_4px_10px_rgba(0,0,0,0.1)]">
                <span class="w-2 h-2 rounded-full bg-rose-300 animate-pulse"></span>
                PERSONALITY AI
            </div>
            
            <h1 class="text-[2.5rem] leading-tight font-montserrat font-black mb-2 text-white drop-shadow-lg tracking-tight flex items-baseline justify-center gap-1">
                80タイプ<span class="text-3xl text-shimmer">診断</span>
            </h1>
            <p class="text-white/90 font-bold text-[14px] mt-4 bg-white/10 inline-block px-5 py-1.5 rounded-full backdrop-blur-sm border border-white/20 shadow-sm">自分でも知らない「自分」に会う</p>
        </div>

        <!-- 診断カード (中間色のグラスモーフィズム) -->
        <main class="glass-panel-mid rounded-[2.5rem] p-7 mb-8 relative overflow-hidden transform transition-all hover:-translate-y-1 duration-300">
            <!-- カード内のデコレーション -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-white rounded-full mix-blend-overlay filter blur-xl opacity-30"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-rose-400 rounded-full mix-blend-overlay filter blur-2xl opacity-40"></div>
            
            <div class="relative z-10 text-center">
                
                <!-- アイコン -->
                <div class="w-20 h-20 mx-auto bg-white/10 rounded-full flex items-center justify-center mb-5 border border-white/40 ring-2 ring-white/10 backdrop-blur-md shadow-lg">
                    <span class="text-4xl text-white drop-shadow-md">🔮</span>
                </div>
                
                <h2 class="text-[22px] leading-snug font-bold mb-3 text-white drop-shadow-sm">
                    本当の自分、<br>知る覚悟はある？
                </h2>
                <p class="text-[13px] text-white/80 font-medium mb-6 leading-relaxed">
                    最新のパーソナリティアルゴリズムが、<br>57の質問からあなたの深層を暴きます。<br>
                    <span class="inline-block mt-3 bg-white/15 text-white border border-white/20 px-3 py-1 rounded text-[11px] font-bold">所要時間：たった3分</span>
                </p>
                
                <!-- プログレス／精度バー -->
                <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-4 mb-7 border border-white/20 shadow-inner">
                    <div class="flex justify-between items-center text-xs font-bold text-white/90 mb-2">
                        <span>診断精度</span>
                        <span class="text-rose-200 text-lg font-montserrat">98.5%</span>
                    </div>
                    <div class="w-full bg-black/20 rounded-full h-2 overflow-hidden border border-black/10">
                        <div class="bg-gradient-to-r from-rose-400 to-orange-400 h-full rounded-full w-[98.5%] shadow-[0_0_10px_rgba(255,107,107,0.6)] relative">
                             <!-- 光のハイライト -->
                             <div class="absolute top-0 right-0 bottom-0 w-8 bg-white/60 blur-[3px]"></div>
                        </div>
                    </div>
                </div>

                <!-- CTAボタン -->
                <button class="btn-twilight w-full py-4 rounded-2xl text-white font-bold text-[17px] transform transition-transform hover:-translate-y-0.5 active:scale-[0.98] flex justify-center items-center gap-2 group">
                    <span>診断をスタート</span>
                    <svg class="w-5 h-5 transform group-hover:translate-x-1.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
                <p class="text-[10px] text-white/60 mt-3 font-medium">※完全無料・登録不要で結果が見られます</p>
            </div>
        </main>

        <!-- ソーシャルプルーフ -->
        <div class="text-center">
            <p class="text-[11px] font-bold text-white/80 mb-3 drop-shadow-sm">🎉 すでに10万人が体験済み！</p>
            <div class="flex justify-center -space-x-3 items-center">
                <img src="https://i.pravatar.cc/100?img=1" class="w-9 h-9 rounded-full border-2 border-[#3b2447] object-cover" alt="user">
                <img src="https://i.pravatar.cc/100?img=3" class="w-9 h-9 rounded-full border-2 border-[#3b2447] object-cover" alt="user">
                <img src="https://i.pravatar.cc/100?img=5" class="w-9 h-9 rounded-full border-2 border-[#3b2447] object-cover" alt="user">
                <img src="https://i.pravatar.cc/100?img=9" class="w-9 h-9 rounded-full border-2 border-[#3b2447] object-cover" alt="user">
                <div class="w-9 h-9 rounded-full border-2 border-[#3b2447] bg-white/20 backdrop-blur-md flex items-center justify-center text-[10px] font-bold text-white">+10k</div>
            </div>
        </div>
        
    </div>
</body>
</html>
