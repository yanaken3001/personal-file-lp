  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Sans JP', 'Sora', sans-serif;
      background: #08080F;
      color: #EAEAEA;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #root {
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ===== LAYOUT ===== */
    .app-container {
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
    }

    /* ===== NEON COLORS ===== */
    :root {
      --neon-cyan: #00F5FF;
      --neon-magenta: #FF00FF;
      --neon-violet: #7B61FF;
      --type-p: #FF2D55;
      --type-a: #4361EE;
      --type-i: #FFBE0B;
      --type-d: #06D6A0;
      --bg-deep: #08080F;
      --bg-surface: #0C0C18;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.08);
      --border-glass: rgba(255, 255, 255, 0.08);
      --border-glow: rgba(255, 255, 255, 0.12);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.4);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes neonPulse {
      0%, 100% {
        box-shadow: 0 0 5px var(--neon-cyan), 0 0 10px rgba(0, 245, 255, 0.3);
      }
      50% {
        box-shadow: 0 0 10px var(--neon-cyan), 0 0 20px rgba(0, 245, 255, 0.5), 0 0 30px rgba(0, 245, 255, 0.2);
      }
    }

    @keyframes glowFade {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes progressFill {
      from { width: 0%; }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }

    @keyframes particleRise {
      0% {
        opacity: 0;
        transform: translateY(100%) scale(0.5);
      }
      20% {
        opacity: 1;
      }
      80% {
        opacity: 0.6;
      }
      100% {
        opacity: 0;
        transform: translateY(-100vh) scale(0.2);
      }
    }

    @keyframes spinNeon {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulseScale {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes dotPulse {
      0%, 60%, 100% { opacity: 0.2; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1.2); }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes borderGlow {
      0%, 100% {
        border-color: rgba(0, 245, 255, 0.3);
      }
      50% {
        border-color: rgba(0, 245, 255, 0.6);
      }
    }

    @keyframes hexPulse {
      0%, 100% {
        filter: drop-shadow(0 0 8px var(--neon-cyan)) drop-shadow(0 0 16px rgba(0, 245, 255, 0.3));
      }
      50% {
        filter: drop-shadow(0 0 16px var(--neon-cyan)) drop-shadow(0 0 32px rgba(0, 245, 255, 0.5));
      }
    }

    /* ===== GLASSMORPHISM ===== */
    .glass-card {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
    }

    .glass-card-strong {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
    }

    /* ===== PARTICLES ===== */
    .particles-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: particleRise linear infinite;
      pointer-events: none;
    }

    /* ===== GRADIENT MESH BG ===== */
    .gradient-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(0, 245, 255, 0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 80% 30%, rgba(123, 97, 255, 0.05) 0%, transparent 70%),
        radial-gradient(ellipse 70% 40% at 50% 80%, rgba(255, 0, 255, 0.04) 0%, transparent 70%),
        linear-gradient(180deg, #08080F 0%, #0C0C18 50%, #08080F 100%);
    }

    /* ===== START SCREEN ===== */
    .start-screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .start-phase {
      opacity: 0;
      transform: translateY(24px);
    }

    .start-phase.visible {
      animation: fadeSlideUp 0.6s ease forwards;
    }

    .hero-icon {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-80-text {
      font-family: 'Sora', sans-serif;
      font-size: 56px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-violet), var(--neon-magenta));
      background-size: 200% 200%;
      animation: gradientShift 4s ease infinite;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.4));
      line-height: 1;
    }

    .hero-hex-border {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      animation: hexPulse 3s ease-in-out infinite;
    }

    .hero-hex-border svg {
      width: 100%;
      height: 100%;
    }

    .start-title {
      font-family: 'Sora', 'Noto Sans JP', sans-serif;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-violet) 50%, var(--neon-magenta) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .start-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-weight: 400;
      line-height: 1.6;
    }

    .info-badges {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .info-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(0, 245, 255, 0.2);
      border-radius: 100px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      transition: border-color 0.3s;
    }

    .info-badge:hover {
      border-color: rgba(0, 245, 255, 0.5);
    }

    .info-badge-icon {
      font-size: 15px;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 320px;
      padding: 18px 32px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-violet));
      border: none;
      border-radius: 16px;
      color: #08080F;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 0 20px rgba(0, 245, 255, 0.3), 0 0 40px rgba(123, 97, 255, 0.2);
      letter-spacing: 0.02em;
    }

    .cta-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -200%;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(0, 245, 255, 0.5), 0 0 60px rgba(123, 97, 255, 0.3);
    }

    .cta-button:active {
      transform: translateY(0);
    }

    .social-proof {
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .social-proof-count {
      color: var(--neon-cyan);
      font-family: 'Sora', sans-serif;
      font-weight: 600;
    }

    .brand-note {
      margin-top: 40px;
      font-family: 'Sora', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* ===== PROGRESS BAR ===== */
    .progress-container {
      padding: 16px 20px 8px;
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(8, 8, 15, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progress-question-num {
      font-family: 'Sora', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--neon-cyan);
    }

    .progress-percentage {
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      color: var(--text-muted);
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-violet), var(--neon-magenta));
      border-radius: 100px;
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 0 8px rgba(0, 245, 255, 0.4);
    }

    /* ===== QUESTION SCREEN ===== */
    .question-screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .question-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 40px;
      animation: fadeSlideIn 0.35s ease;
    }

    .question-encourage {
      font-size: 13px;
      color: var(--neon-cyan);
      margin-bottom: 16px;
      font-weight: 600;
      padding: 8px 20px;
      background: rgba(0, 245, 255, 0.06);
      border: 1px solid rgba(0, 245, 255, 0.15);
      border-radius: 100px;
      animation: glowFade 2s ease-in-out infinite;
    }

    /* --- Q Badge (scanner-style icon) --- */
    .q-badge-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      margin-bottom: 24px;
    }

    .q-badge-corner {
      position: absolute;
      width: 14px;
      height: 14px;
    }
    .q-badge-corner.tl {
      top: 0; left: 0;
      border-top: 2px solid var(--neon-magenta);
      border-left: 2px solid var(--neon-magenta);
      border-radius: 4px 0 0 0;
      opacity: 0.6;
    }
    .q-badge-corner.tr {
      top: 0; right: 0;
      border-top: 2px solid var(--neon-violet);
      border-right: 2px solid var(--neon-violet);
      border-radius: 0 4px 0 0;
      opacity: 0.5;
    }
    .q-badge-corner.bl {
      bottom: 0; left: 0;
      border-bottom: 2px solid var(--neon-violet);
      border-left: 2px solid var(--neon-violet);
      border-radius: 0 0 0 4px;
      opacity: 0.5;
    }
    .q-badge-corner.br {
      bottom: 0; right: 0;
      border-bottom: 2px solid var(--neon-magenta);
      border-right: 2px solid var(--neon-magenta);
      border-radius: 0 0 4px 0;
      opacity: 0.6;
    }

    .q-badge-orb {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--neon-magenta), var(--neon-violet));
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 28px rgba(255, 0, 255, 0.2), 0 0 56px rgba(123, 97, 255, 0.1);
    }

    .q-badge-text {
      font-family: 'Sora', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
      line-height: 1;
    }

    .question-text {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.7;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 44px;
      max-width: 400px;
    }

    /* ===== LIKERT SCALE ===== */
    .likert-container {
      width: 100%;
      max-width: 400px;
    }

    .likert-track {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .likert-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
      font-family: 'Sora', sans-serif;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .likert-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 45, 85, 0.3);
    }

    .likert-btn:active {
      transform: scale(0.95);
    }

    .likert-btn.selected {
      color: #FFFFFF;
      font-weight: 700;
      border-color: transparent;
      transform: scale(1.02);
    }

    .likert-btn.selected.color-P,
    .likert-btn.selected.color-K {
      background: linear-gradient(135deg, #FF2D55, #4361EE);
      box-shadow: 0 4px 20px rgba(255, 45, 85, 0.3);
    }
    .likert-btn.selected.color-A,
    .likert-btn.selected.color-J {
      background: linear-gradient(135deg, #4361EE, #06D6A0);
      box-shadow: 0 4px 20px rgba(67, 97, 238, 0.3);
    }
    .likert-btn.selected.color-I,
    .likert-btn.selected.color-H {
      background: linear-gradient(135deg, #FFBE0B, #FF2D55);
      box-shadow: 0 4px 20px rgba(255, 190, 11, 0.3);
    }
    .likert-btn.selected.color-D,
    .likert-btn.selected.color-E {
      background: linear-gradient(135deg, #06D6A0, #4361EE);
      box-shadow: 0 4px 20px rgba(6, 214, 160, 0.3);
    }
    .likert-btn.selected.color-G {
      background: linear-gradient(135deg, #FF00FF, #7B61FF);
      box-shadow: 0 4px 20px rgba(255, 0, 255, 0.3);
    }

    .likert-labels {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0 2px;
    }

    .likert-label {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.35;
      width: 56px;
      flex-shrink: 0;
    }

    .likert-label-center {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      text-align: center;
      line-height: 1.35;
      flex: 1;
    }

    /* ===== BACK BUTTON (text link style) ===== */
    .back-text-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 16px 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      transition: color 0.2s ease;
    }

    .back-text-btn:hover {
      color: #999;
    }

    /* ===== LOADING SCREEN ===== */
    .loading-screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .loading-spinner {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--neon-cyan);
      border-right-color: var(--neon-violet);
      animation: spinNeon 1s linear infinite;
      margin-bottom: 32px;
      position: relative;
    }

    .loading-spinner::before {
      content: '';
      position: absolute;
      top: 4px;
      left: 4px;
      right: 4px;
      bottom: 4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: var(--neon-magenta);
      border-left-color: var(--neon-cyan);
      animation: spinNeon 1.5s linear reverse infinite;
    }

    .loading-message {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
      min-height: 24px;
      transition: opacity 0.3s;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-cyan);
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) {
      animation-delay: 0.2s;
      background: var(--neon-violet);
    }

    .loading-dot:nth-child(3) {
      animation-delay: 0.4s;
      background: var(--neon-magenta);
    }

    /* ===== RESULT SCREEN ===== */
    .result-screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;

    function determinePersonalityType(scores) {
      const axes = [
        { code: "D", score: scores.D },
        { code: "P", score: scores.P },
        { code: "A", score: scores.A },
        { code: "I", score: scores.I },
      ];
      axes.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        const priority = { D: 0, P: 1, A: 2, I: 3 };
        return priority[a.code] - priority[b.code];
      });
      const first = axes[0];
      const second = axes[1];
      if (first.score - second.score >= 16) {
        return first.code + first.code;
      }
      return first.code + second.code;
    }

    function determineBehavioralType(scores) {
      const types = [
        { code: "K", name: "達成型", score: scores.K },
        { code: "H", name: "平和型", score: scores.H },

        { code: "G", name: "外見型", score: scores.G },
        { code: "E", name: "効率型", score: scores.E },
      ];
      types.sort((a, b) => b.score - a.score);
      return types[0];
    }

    // --- OGPメタタグ動的更新 ---
    function updateOGPMeta(personalityCode, behaviorType) {
      const typeMeta = TYPE_META[personalityCode];
      if (!typeMeta) return;
      const title = `${behaviorType}${typeMeta.name}（${typeMeta.subname}）| 80タイプ診断`;
      const description = `あなたは80タイプの中で「${behaviorType}${typeMeta.name}」でした。あなたのタイプは？`;

      const setMeta = (property, content) => {
        let meta = document.querySelector(`meta[property="${property}"]`) ||
                   document.querySelector(`meta[name="${property}"]`);
        if (!meta) {
          meta = document.createElement('meta');
          meta.setAttribute(property.startsWith('og:') ? 'property' : 'name', property);
          document.head.appendChild(meta);
        }
        meta.setAttribute('content', content);
      };

      document.title = title;
      setMeta('og:title', title);
      setMeta('og:description', description);
      setMeta('og:type', 'website');
      setMeta('og:url', window.location.href);
      setMeta('twitter:card', 'summary_large_image');
      setMeta('twitter:title', title);
      setMeta('twitter:description', description);
    }

    // --- OGPシェアカード生成（Canvas API）---
    async function generateShareCard(personalityCode, behaviorType, keywords) {
      const canvas = document.createElement('canvas');
      canvas.width = 1200;
      canvas.height = 630;
      const ctx = canvas.getContext('2d');
      const typeColor = getTypeColor(personalityCode);
      const typeMeta = TYPE_META[personalityCode];
      if (!typeMeta) return null;

      // 背景グラデーション
      const bgGrad = ctx.createLinearGradient(0, 0, 1200, 630);
      bgGrad.addColorStop(0, '#0D1117');
      bgGrad.addColorStop(1, '#1A1A2E');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, 1200, 630);

      // タイプカラーのアクセント線（上部）
      const accentGrad = ctx.createLinearGradient(0, 0, 1200, 0);
      accentGrad.addColorStop(0, typeColor.primary);
      accentGrad.addColorStop(1, typeColor.secondary);
      ctx.fillStyle = accentGrad;
      ctx.fillRect(0, 0, 1200, 6);

      // タイプカラーの丸（装飾）
      ctx.beginPath();
      ctx.arc(1000, 315, 200, 0, Math.PI * 2);
      ctx.fillStyle = typeColor.light;
      ctx.fill();

      // タイトル「80 TYPE DIAGNOSIS」
      ctx.font = '600 18px "Helvetica Neue", Arial, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fillText('80 TYPE DIAGNOSIS', 80, 80);

      // 「あなたは」
      ctx.font = '400 24px "Hiragino Sans", "Yu Gothic", sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fillText('あなたは', 80, 200);

      // タイプ名（大きく）
      ctx.font = '800 56px "Hiragino Sans", "Yu Gothic", sans-serif';
      ctx.fillStyle = '#fff';
      ctx.fillText(`${behaviorType}${typeMeta.name}`, 80, 280);

      // サブネーム
      ctx.font = '500 28px "Hiragino Sans", "Yu Gothic", sans-serif';
      ctx.fillStyle = typeColor.primary;
      ctx.fillText(`${typeMeta.subname}（${personalityCode}）`, 80, 330);

      // Emoji
      ctx.font = '120px sans-serif';
      ctx.fillText(typeMeta.emoji, 950, 350);

      // キーワードタグ
      if (keywords && keywords.length > 0) {
        const tagY = 420;
        let tagX = 80;
        ctx.font = '500 18px "Hiragino Sans", "Yu Gothic", sans-serif';
        keywords.slice(0, 3).forEach((kw) => {
          const text = `#${kw}`;
          const textWidth = ctx.measureText(text).width;
          ctx.fillStyle = typeColor.light;
          if (ctx.roundRect) {
            ctx.beginPath();
            ctx.roundRect(tagX - 8, tagY - 18, textWidth + 16, 32, 6);
            ctx.fill();
          } else {
            ctx.fillRect(tagX - 8, tagY - 18, textWidth + 16, 32);
          }
          ctx.fillStyle = typeColor.primary;
          ctx.fillText(text, tagX, tagY + 4);
          tagX += textWidth + 28;
        });
      }

      // URL
      ctx.font = '400 16px "Helvetica Neue", Arial, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'left';
      ctx.fillText('personal-file.jp/80type', 80, 580);

      // PERSONAL FILE ロゴテキスト
      ctx.font = '700 16px "Helvetica Neue", Arial, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.textAlign = 'right';
      ctx.fillText('PERSONAL FILE', 1120, 580);
      ctx.textAlign = 'left';

      return canvas.toDataURL('image/png');
    }

    // --- ScoreSliders ---
    function ScoreSliders({ scores }) {
      const axes = [
        { left: '行動志向', right: '慎重志向', leftKey: 'P', rightKey: 'A', leftColor: TYPE_COLORS.P.primary, rightColor: TYPE_COLORS.A.primary },
        { left: '感覚重視', right: '論理重視', leftKey: 'P', rightKey: 'A', leftColor: TYPE_COLORS.P.primary, rightColor: TYPE_COLORS.A.primary },
        { left: '個人主義', right: '協調重視', leftKey: 'D', rightKey: 'I', leftColor: TYPE_COLORS.D.primary, rightColor: TYPE_COLORS.I.primary },
        { left: '安定志向', right: '挑戦志向', leftKey: 'I', rightKey: 'D', leftColor: TYPE_COLORS.I.primary, rightColor: TYPE_COLORS.D.primary },
      ];

      const computePercentage = (key1, key2) => {
        const total = scores[key1] + scores[key2];
        if (total === 0) return 50;
        return Math.round((scores[key1] / total) * 100);
      };

      return (
        <div style={{
          background: 'rgba(255,255,255,0.03)',
          borderRadius: '16px',
          padding: '24px',
          margin: '24px 0'
        }}>
          <h2 style={{
            fontSize: '20px',
            fontWeight: '700',
            color: '#fff',
            marginBottom: '24px',
            display: 'flex',
            alignItems: 'center',
            gap: '8px'
          }}>
            <span style={{
              display: 'inline-flex',
              alignItems: 'center',
              justifyContent: 'center',
              width: '28px',
              height: '28px',
              borderRadius: '50%',
              border: '2px solid rgba(255,255,255,0.3)',
              fontSize: '14px',
              fontWeight: '600'
            }}>1</span>
            性格特性
          </h2>

          {axes.map((axis, i) => {
            const leftPct = computePercentage(axis.leftKey, axis.rightKey);
            const rightPct = 100 - leftPct;
            const dominant = leftPct >= 50 ? 'left' : 'right';

            return (
              <div key={i} style={{ marginBottom: '20px' }}>
                <div style={{
                  display: 'flex',
                  justifyContent: 'space-between',
                  marginBottom: '8px'
                }}>
                  <span style={{
                    fontSize: '13px',
                    fontWeight: dominant === 'left' ? '700' : '400',
                    color: dominant === 'left' ? axis.leftColor : 'rgba(255,255,255,0.4)'
                  }}>
                    {axis.left}
                  </span>
                  <span style={{
                    fontSize: '14px',
                    fontWeight: '700',
                    color: dominant === 'left' ? axis.leftColor : axis.rightColor
                  }}>
                    {dominant === 'left' ? `${leftPct}%` : `${rightPct}%`}
                  </span>
                  <span style={{
                    fontSize: '13px',
                    fontWeight: dominant === 'right' ? '700' : '400',
                    color: dominant === 'right' ? axis.rightColor : 'rgba(255,255,255,0.4)'
                  }}>
                    {axis.right}
                  </span>
                </div>

                <div style={{
                  display: 'flex',
                  height: '8px',
                  borderRadius: '4px',
                  overflow: 'hidden',
                  background: 'rgba(255,255,255,0.06)'
                }}>
                  <div style={{
                    width: `${leftPct}%`,
                    background: axis.leftColor,
                    borderRadius: leftPct > 50 ? '4px 0 0 4px' : '4px',
                    transition: 'width 1s cubic-bezier(0.4, 0, 0.2, 1)'
                  }} />
                  <div style={{
                    width: `${rightPct}%`,
                    background: axis.rightColor,
                    borderRadius: rightPct > 50 ? '0 4px 4px 0' : '4px',
                    transition: 'width 1s cubic-bezier(0.4, 0, 0.2, 1)'
                  }} />
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // --- RadarChart ---
    function RadarChart({ behaviorScores, personalityCode }) {
      const typeColor = getTypeColor(personalityCode);
      const labels = ['達成', '平和', '情報', '外見', '効率'];
      const maxScore = 25;
      const center = 150;
      const radius = 110;

      const getPoint = (index, value) => {
        const angle = (Math.PI * 2 * index) / labels.length - Math.PI / 2;
        const r = (value / maxScore) * radius;
        return {
          x: center + r * Math.cos(angle),
          y: center + r * Math.sin(angle)
        };
      };

      const gridLevels = [0.25, 0.5, 0.75, 1];

      return (
        <div style={{
          background: 'rgba(255,255,255,0.03)',
          borderRadius: '16px',
          padding: '24px',
          margin: '24px 0',
          textAlign: 'center'
        }}>
          <h2 style={{
            fontSize: '20px',
            fontWeight: '700',
            color: '#fff',
            marginBottom: '16px',
            display: 'flex',
            alignItems: 'center',
            gap: '8px',
            justifyContent: 'center'
          }}>
            <span style={{
              display: 'inline-flex',
              alignItems: 'center',
              justifyContent: 'center',
              width: '28px',
              height: '28px',
              borderRadius: '50%',
              border: '2px solid rgba(255,255,255,0.3)',
              fontSize: '14px',
              fontWeight: '600'
            }}>2</span>
            行動タイプ分析
          </h2>

          <svg width="300" height="300" viewBox="0 0 300 300" style={{ maxWidth: '100%' }}>
            {gridLevels.map((level, li) => (
              <polygon
                key={li}
                points={labels.map((_, i) => {
                  const p = getPoint(i, maxScore * level);
                  return `${p.x},${p.y}`;
                }).join(' ')}
                fill="none"
                stroke="rgba(255,255,255,0.08)"
                strokeWidth="1"
              />
            ))}

            {labels.map((_, i) => {
              const p = getPoint(i, maxScore);
              return (
                <line
                  key={i}
                  x1={center} y1={center}
                  x2={p.x} y2={p.y}
                  stroke="rgba(255,255,255,0.06)"
                  strokeWidth="1"
                />
              );
            })}

            <polygon
              points={labels.map((label, i) => {
                const p = getPoint(i, behaviorScores[label] || 0);
                return `${p.x},${p.y}`;
              }).join(' ')}
              fill={typeColor.glow}
              stroke={typeColor.primary}
              strokeWidth="2"
            />

            {labels.map((label, i) => {
              const p = getPoint(i, behaviorScores[label] || 0);
              return (
                <circle
                  key={`dot-${i}`}
                  cx={p.x} cy={p.y} r="4"
                  fill={typeColor.primary}
                />
              );
            })}

            {labels.map((label, i) => {
              const p = getPoint(i, maxScore + 5);
              return (
                <text
                  key={`label-${i}`}
                  x={p.x} y={p.y}
                  textAnchor="middle"
                  dominantBaseline="middle"
                  fill="rgba(255,255,255,0.7)"
                  fontSize="13"
                  fontWeight="600"
                >
                  {label}型
                </text>
              );
            })}
          </svg>
        </div>
      );
    }

    // --- StickySidebar ---
    function StickySidebar({ personalityCode, behaviorType, sections }) {
      const typeColor = getTypeColor(personalityCode);
      const typeMeta = TYPE_META[personalityCode];
      const [activeSection, setActiveSection] = React.useState(0);

      React.useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const idx = parseInt(entry.target.dataset.sectionIndex);
              if (!isNaN(idx)) setActiveSection(idx);
            }
          });
        }, { threshold: 0.3 });

        document.querySelectorAll('[data-section-index]').forEach(el => {
          observer.observe(el);
        });

        return () => observer.disconnect();
      }, []);

      if (!typeMeta) return null;

      return (

    // ===================================================================
    // APP (ROOT)
    // ===================================================================

    function App() {
      const [phase, setPhase] = React.useState('start'); // start | quiz | chapterTransition | loading | result
      const [qIndex, setQIndex] = React.useState(0);
      const [scores, setScores] = React.useState({ P: 0, A: 0, I: 0, D: 0, K: 0, H: 0, J: 0, G: 0, E: 0 });
      const [answerHistory, setAnswerHistory] = React.useState([]);
      const [nextChapter, setNextChapter] = React.useState(null);

      const handleStart = () => {
        setPhase('quiz');
        window.scrollTo(0, 0);
      };

      // チャプター境界かどうか判定
      const getChapterForQuestion = (idx) => {
        return CHAPTERS.find(ch => idx >= ch.questionRange[0] && idx <= ch.questionRange[1]);
      };

      const handleAnswer = (value) => {
        const question = ORDERED_QUESTIONS[qIndex];
        const axis = question.axis;

        // Update scores
        const newScores = { ...scores };

        // If re-answering a question, subtract previous answer first
        if (answerHistory[qIndex] !== undefined && answerHistory[qIndex] !== null) {
          const prevAxis = ORDERED_QUESTIONS[qIndex].axis;
          newScores[prevAxis] -= answerHistory[qIndex];
        }

        newScores[axis] += value;
        setScores(newScores);

        // Update answer history
        const newHistory = [...answerHistory];
        newHistory[qIndex] = value;
        setAnswerHistory(newHistory);

        // Advance
        if (qIndex + 1 < TOTAL_QUESTIONS) {
          const nextIdx = qIndex + 1;
          const currentCh = getChapterForQuestion(qIndex);
          const nextCh = getChapterForQuestion(nextIdx);

          // チャプターが変わったらインタースティシャル表示
          if (currentCh && nextCh && currentCh.id !== nextCh.id) {
            setNextChapter(nextCh);
            setQIndex(nextIdx);
            setPhase('chapterTransition');
          } else {
            setQIndex(nextIdx);
          }
          window.scrollTo(0, 0);
        } else {
          // All questions answered
          setPhase('loading');
          window.scrollTo(0, 0);
        }
      };

      const handleBack = () => {
        if (qIndex > 0) {
          // Subtract the current question's answer from scores if it exists
          if (answerHistory[qIndex] !== undefined && answerHistory[qIndex] !== null) {
            const question = ORDERED_QUESTIONS[qIndex];
            const newScores = { ...scores };
            newScores[question.axis] -= answerHistory[qIndex];
            setScores(newScores);

            const newHistory = [...answerHistory];
            newHistory[qIndex] = null;
            setAnswerHistory(newHistory);
          }
          setQIndex(qIndex - 1);
          window.scrollTo(0, 0);
        }
      };

      const handleChapterTransitionComplete = () => {
        setPhase('quiz');
        setNextChapter(null);
      };

      const handleLoadingComplete = () => {
        setPhase('result');
        window.scrollTo(0, 0);
      };

      return (
        <div className="app-container">
          {phase === 'start' && (
            <StartScreen80 onStart={handleStart} />
          )}
          {phase === 'quiz' && (
            <QuestionScreen80
              qIndex={qIndex}
              onAnswer={handleAnswer}
              onBack={handleBack}
              answerHistory={answerHistory}
            />
          )}
          {phase === 'chapterTransition' && nextChapter && (
            <ChapterTransition chapter={nextChapter} onComplete={handleChapterTransitionComplete} />
          )}
          {phase === 'loading' && (
            <LoadingScreen80 onComplete={handleLoadingComplete} />
          )}
          {phase === 'result' && (
            <ResultScreen80 scores={scores} />
          )}
        </div>
      );
    }

    // ===================================================================
    // RENDER
    // ===================================================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
