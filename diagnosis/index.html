// ─── Animated Diagnosis Counter ───
function DiagCounter({ style = {} }) {
  const [count, setCount] = useState(31247);
  useEffect(() => {
    const iv = setInterval(() => {
      // ランダム間隔で+1（リアルタイム感）
      setCount((c) => c + 1);
    }, 8000 + Math.random() * 12000); // 8-20秒ごとに+1
    return () => clearInterval(iv);
  }, []);
  return <span style={{ color: "#E0E0E8", fontWeight: 700, ...style }}>{count.toLocaleString()}人</span>;
}

function ScoreBar({ scores, resultType }) {
  const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
  const types = ["P", "I", "A", "D"];
  return (
    <div style={{ marginBottom: "24px" }}>
      <div style={{ display: "flex", gap: "6px" }}>
        {types.map((t) => {
          const pct = Math.round((scores[t] / total) * 100);
          const td = TYPE_DATA[t];
          const isActive = t === resultType;
          return (
            <div key={t} style={{ flex: Math.max(scores[t], 0.5), minWidth: "30px", transition: "flex 0.8s ease" }}>
              <div
                style={{
                  height: "8px",
                  borderRadius: "4px",
                  background: isActive ? td.gradient : `${td.color}40`,

                  marginBottom: "6px",
                }}
              />

                  display: "block",
                  fontSize: "11px",
                  fontWeight: isActive ? 700 : 500,
                  color: isActive ? td.color : "#555",

                }}

    </div>
  );
}

function LoadingScreen() {
  const [dots, setDots] = useState(0);
  const [msg, setMsg] = useState(0);
  const msgs = ["回答を分析しています", "パーソナリティを判定中", "あなたのタイプを特定中"];

  useEffect(() => {
    const iv1 = setInterval(() => setDots((d) => (d + 1) % 4), 400);
    const iv2 = setInterval(() => setMsg((m) => Math.min(m + 1, msgs.length - 1)), 800);
    return () => {
      clearInterval(iv1);
      clearInterval(iv2);
    };
  }, []);

  return (
    <div style={{ ...styles.inner, justifyContent: "center", alignItems: "center", textAlign: "center" }}>
      <div
        style={{
          width: "64px",
          height: "64px",
          borderRadius: "50%",
          border: "3px solid rgba(255,45,85,0.15)",
          borderTopColor: "#FF2D55",
          animation: "spin 0.8s linear infinite",
          marginBottom: "24px",
        }}
      />
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
      <p style={{ fontSize: "15px", color: "#888", fontWeight: 600, transition: "all 0.3s ease" }}>
        {msgs[msg]}
        {".".repeat(dots)}
      </p>
    </div>
  );
}

// ─── App ───
function App() {
  const [phase, setPhase] = useState("start");
  const [qIndex, setQIndex] = useState(0);
  const [scores, setScores] = useState({ P: 0, I: 0, A: 0, D: 0 });

  const handleStart = () => setPhase("quiz");

  const handleAnswer = (type) => {
    const newScores = { ...scores, [type]: scores[type] + 1 };
    setScores(newScores);

    if (qIndex < QUESTIONS.length - 1) {
      setQIndex(qIndex + 1);
    } else {
      setPhase("loading");
      setTimeout(() => setPhase("result"), 2200);
    }
  };

  const accentColor = "#FF2D55";

  if (phase === "result") {
    return <ResultScreen scores={scores} />;
  }

  return (
    <div style={styles.container}>
      <div style={{ ...styles.bgGlow(accentColor), top: "-300px", right: "-200px" }} />
      <div style={{ ...styles.bgGlow(accentColor), bottom: "-300px", left: "-200px" }} />
      <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet"
      />

      {phase === "start" && <StartScreen onStart={handleStart} />}
      {phase === "quiz" && (
        <QuestionScreen question={QUESTIONS[qIndex]} qIndex={qIndex} total={QUESTIONS.length} onAnswer={handleAnswer} />
      )}
      {phase === "loading" && <LoadingScreen />}
    </div>
  );
}


// ─── Mount ───
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
